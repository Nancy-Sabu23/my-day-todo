<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">

        <h2>To-Do App</h2>

        <ul class="menu">
            <li class="active">☀ My Day</li>
            <li>⭐ Important</li>
            <li>📅 Planned</li>
            <li>📝 Tasks</li>
        </ul>

    </div>

    <div class="main">

        <div class="header">
            <h1>My Day</h1>
            <p id="date"></p>
        </div>

        <div class="add-task">

            <input
                type="text"
                id="taskInput"
                placeholder="Add a task..."
            >

            <button id="addBtn">+</button>

        </div>

        <ul id="taskList"></ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
    <div class="container">
        <h1>My To-Do List</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a task">
            <button id="addBtn">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>

</body>
</html>
